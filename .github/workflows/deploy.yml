name: Build and Deploy to GitHub Pages

permissions:
  contents: write

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Node.js 환경 설정
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Next.js가 지원하는 버전

      # 3. 의존성 설치 (Tailwind v4 native binary npm 버그 우회 설치 포함)
      - name: Install dependencies
        run: |
          npm install
          npm install --no-save @tailwindcss/oxide-linux-x64-gnu@4.3.0 @tailwindcss/oxide-linux-arm64-gnu@4.3.0

      # 4. 빌드
      - name: Build
        run: npm run build

      # 5. GitHub Pages에 배포
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out # next export의 출력 디렉토리
